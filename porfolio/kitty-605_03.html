<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitty 605-03 | Primal Urge Portfolio</title>
  <style>
    :root {
      --bg: #f7f1e8;
      --card: #fffaf3;
      --ink: #2a211a;
      --muted: #6e6258;
      --accent: #8b5e3c;
      --border: #e3d2bd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    .eyebrow {
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.78rem;
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.1;
    }

    .subtitle {
      max-width: 720px;
      margin: 12px auto 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 28px;
    }

    figure {
      margin: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(42, 33, 26, 0.10);
    }

    figure img {
      width: 100%;
      height: 360px;
      object-fit: cover;
      display: block;
    }

    figcaption {
      padding: 12px 14px 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .note {
      margin: 28px auto 0;
      max-width: 780px;
      background: rgba(255, 250, 243, 0.75);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 18px;
      color: var(--muted);
      text-align: center;
    }

    footer {
      text-align: center;
      margin-top: 28px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 850px) {
      .gallery {
        grid-template-columns: 1fr;
      }

      figure img {
        height: auto;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="eyebrow">Primal Urge Portfolio</div>
      <h1>Kitty 605-03</h1>
      <p class="subtitle">Three polished views of a bright-eyed black cat, prepared as a simple mobile-friendly portfolio page.</p>
    </header>
                                        
    <section class="gallery" aria-label="Kitty 605-03 photo gallery">
      <figure>
        <img src="image/kitty-605_03-view-a.jpg" alt="Black cat sitting on a windowsill, original enhanced view" />
        <figcaption>View A</figcaption>
      </figure>

      <figure>
        <img src="image/kitty-605_03-view-b.jpg" alt="Black cat on a windowsill with a grassy field outside the window" />
        <figcaption><strong>View B</strong><br>Take the image in View A and fix up the lighting and the detail. The image behind the cat should be a grassy field. The new image should be photorealistic.</figcaption>
      </figure>

      <figure>
        <img src="image/kitty-605_03-view-c.jpg" alt="Black cat on a windowsill with the original background sharpened and cleaned up" />
        <figcaption><strong>View C</strong><br>Looks good. Do one more version that keeps the current background image but clean up the detail and focus of the background.</figcaption>
      </figure>
    </section>

    <section class="note">
      <strong>Image folder:</strong> This page expects the three JPG files to be located at <code>core3.com/PrimalUrge/image/</code>.
    </section>

    <footer>
      &copy; Primal Urge
    </footer>
  </main>
</body>
</html>
